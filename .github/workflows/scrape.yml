name: Run Monthly Scraper

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scrape.py

      - name: Commit and Push CSV result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Trik Perbaikan: Cek dulu apakah filenya ada sebelum di-upload
          if [ -f berita-mei-2026.csv ]; then
            git add berita-mei-2026.csv
            git commit -m "Update hasil scraping $(date)"
            git push
          else
            echo "File berita-mei-2026.csv tidak ditemukan karena data kosong atau diblokir. Melewati proses upload."
          fi
