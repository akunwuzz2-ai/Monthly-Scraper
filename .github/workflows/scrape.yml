name: Deploy Web Berita

on:
  push:
    paths:
      - 'berita-mei-2026.csv'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Upgrade ke v4

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Upgrade ke v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # Upgrade ke v3 (Menggunakan backend baru yang diwajibkan)
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Upgrade ke v4
