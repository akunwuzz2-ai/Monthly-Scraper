<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Berita Kanwil BPN Kepri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans flex flex-col">

    <nav class="bg-gradient-to-r from-blue-900 to-indigo-900 text-white shadow-xl sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-2">
            <div>
                <h1 class="text-2xl font-bold tracking-wide flex items-center gap-2">
                    🏢 Monitoring Berita Kementerian ATR/BPN
                </h1>
                <p class="text-xs text-blue-200 mt-0.5">Satuan Kerja: Regional Office / Kanwil BPN Provinsi Riau Kepulauan</p>
            </div>
            <div class="bg-blue-800/50 border border-blue-700 px-3 py-1.5 rounded-full text-xs font-semibold tracking-wider text-blue-100 uppercase">
                📅 Arsip Periode Mei 2026
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-10 px-4 flex-grow">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-24 flex flex-col items-center justify-center gap-3 text-slate-500">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-lg font-medium mt-2 animate-pulse">Menghubungkan & Memetakan Berita Terbaru...</p>
            </div>
        </div>
    </main>

    <div id="news-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 items-center justify-center p-4 transition-all duration-300">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto shadow-2xl flex flex-col transform scale-95 transition-transform duration-300">
            <div class="relative h-64 md:h-80 w-full bg-slate-100 overflow-hidden">
                <img id="modal-image" src="" class="w-full h-full object-cover" alt="Banner Berita">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex items-end p-6">
                    <span id="modal-date" class="text-xs font-bold uppercase tracking-wider text-blue-300 bg-blue-950/80 px-2.5 py-1 rounded-md"></span>
                </div>
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-black/80 text-white w-9 h-9 rounded-full flex items-center justify-center text-xl font-bold transition">
                    &times;
                </button>
            </div>
            <div class="p-6 md:p-8 overflow-y-auto">
                <h2 id="modal-title" class="text-xl md:text-2xl font-bold text-slate-800 mb-4 leading-snug"></h2>
                <div id="modal-content" class="text-slate-600 leading-relaxed text-sm md:text-base space-y-4 whitespace-pre-line border-t border-slate-100 pt-4">
                    </div>
            </div>
            <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-3 rounded-b-2xl">
                <a id="modal-original-url" href="#" target="_blank" class="text-xs md:text-sm text-blue-600 font-semibold hover:underline flex items-center gap-1">
                    🌐 Lihat Publikasi Asli di Situs ATR/BPN ↗
                </a>
                <button onclick="closeModal()" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-xl text-sm font-medium transition">
                    Tutup Halaman
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 text-center text-xs md:text-sm">
        <div class="container mx-auto px-4">
            <p>© 2026 Kanwil BPN Provinsi Riau Kepulauan. Sistem Monitoring Mandiri.</p>
        </div>
    </footer>

    <script>
        // Array global untuk menyimpan data setelah di-parse
        let articlesData = [];

        // Membaca file CSV menggunakan PapaParse dengan pengaturan indeks
        Papa.parse("berita-mei-2026-full (1).csv", {
            download: true,
            header: true, // true karena file CSV baru memiliki baris header yang rapi
            skipEmptyLines: true,
            complete: function(results) {
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // Kosongkan animasi loading

                articlesData = results.data;

                if (articlesData.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-2xl shadow p-8 text-slate-400">
                            ⚠️ Tidak ada rekaman data berita untuk periode Mei 2026.
                        </div>`;
                    return;
                }

                articlesData.forEach((item, index) => {
                    // Penyelarasan nama kolom dari file CSV Anda yang baru
                    const judul = item.judul ? item.judul.trim() : '';
                    const tanggal = item.tanggal ? item.tanggal.trim() : 'Mei 2026';
                    const url = item.url ? item.url.trim() : '#';
                    const gambar = item.gambar ? item.gambar.trim() : 'https://via.placeholder.com/600x400?text=Kementerian+ATR/BPN';
                    const konten = item.content ? item.content.trim() : '';

                    if (!judul) return; // Lewati jika baris kosong atau tidak valid

                    // Potong konten untuk ringkasan kartu berita (maksimal 130 karakter)
                    const ringkasan = konten.length > 130 ? konten.substring(0, 130) + '...' : konten;

                    const card = `
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between">
                            <div>
                                <div class="h-48 w-full overflow-hidden bg-slate-100 relative">
                                    <img src="${gambar}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/600x400?text=Kementerian+ATR/BPN'">
                                    <span class="absolute bottom-3 left-3 bg-white/90 backdrop-blur-xs text-blue-900 font-bold text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-md shadow-xs">
                                        📅 ${tanggal}
                                    </span>
                                </div>
                                <div class="p-6">
                                    <h2 class="text-base font-bold text-slate-800 leading-snug mb-3 line-clamp-3 hover:text-blue-700 transition" title="${judul}">
                                        ${judul}
                                    </h2>
                                    <p class="text-slate-500 text-xs md:text-sm leading-relaxed mb-4">
                                        ${ringkasan || 'Klik tombol di bawah untuk melihat rincian pengumuman.'}
                                    </p>
                                </div>
                            </div>
                            <div class="px-6 pb-6 pt-2">
                                <button onclick="openModal(${index})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl text-xs md:text-sm shadow-sm hover:shadow-md transition text-center block">
                                    Pratinjau Berita
                                </button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            },
            error: function(err) {
                document.getElementById('news-container').innerHTML = `
                    <div class="col-span-full text-center py-20 bg-white rounded-2xl shadow p-8 text-red-500">
                        💥 Terjadi gangguan saat memetakan file database CSV: ${err.message}
                    </div>`;
            }
        });

        // FUNGSI UNTUK MEMBUKA MODAL DETAIL BERITA
        function openModal(index) {
            const item = articlesData[index];
            if(!item) return;

            document.getElementById('modal-title').innerText = item.judul || 'Detail Berita';
            document.getElementById('modal-date').innerText = `📅 Diterbitkan pada: ${item.tanggal || 'Mei 2026'}`;
            document.getElementById('modal-content').innerText = item.content || 'Konten berita tidak tersedia.';
            document.getElementById('modal-image').src = item.gambar || 'https://via.placeholder.com/600x400?text=Kementerian+ATR/BPN';
            document.getElementById('modal-original-url').href = item.url || '#';

            const modal = document.getElementById('news-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; // Kunci scroll layar utama
        }

        // FUNGSI UNTUK MENUTUP MODAL
        function closeModal() {
            const modal = document.getElementById('news-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; // Aktifkan kembali scroll layar utama
        }

        // Menutup modal otomatis jika menekan area luar jendela putih modal
        window.onclick = function(event) {
            const modal = document.getElementById('news-modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
