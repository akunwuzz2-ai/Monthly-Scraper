<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Berita Kanwil BPN Kepri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-800 text-white p-4 shadow-lg">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">Arsip Berita Mei 2026</h1>
            <p class="text-sm opacity-80">Satuan Kerja: Kanwil BPN Provinsi Riau Kepulauan</p>
        </div>
    </nav>

    <div class="container mx-auto py-8 px-4">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 text-gray-500">Memuat data berita...</div>
        </div>
    </div>

    <script>
        // Membaca file CSV lokal
        Papa.parse("berita-mei-2026.csv", {
            download: true,
            header: true,
            complete: function(results) {
                const container = document.getElementById('news-container');
                container.innerHTML = ''; // Kosongkan loader

                results.data.forEach(item => {
                    if(item.judul) {
                        const card = `
                            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition">
                                <div class="p-5">
                                    <span class="text-xs font-semibold text-blue-600 uppercase">${item.tanggal}</span>
                                    <h2 class="text-xl font-bold my-2 text-gray-800">${item.judul}</h2>
                                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">${item.konten.substring(0, 150)}...</p>
                                    <a href="${item.url}" target="_blank" class="inline-block bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Baca Selengkapnya</a>
                                </div>
                            </div>
                        `;
                        container.innerHTML += card;
                    }
                });
            }
        });
    </script>
</body>
</html>
